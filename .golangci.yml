# Visit https://golangci-lint.run/ for usage documentation
# and information on other useful linters
version: "2"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  settings:
    errcheck:
      exclude-functions:
        - (*os.File).Close
  disable-all: true
  enable:
    - durationcheck
    - errcheck
    - copyloopvar
    - forcetypeassert
    - godot
    - ineffassign
    - makezero
    - misspell
    - nilerr
    - predeclared
    - staticcheck
    - unconvert
    - unparam
    - unused
    - govet

formatters:
  enable:
    - gofmt
