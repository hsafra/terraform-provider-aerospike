services:
  aerospike-source:
    image: aerospike:ee-${AEROSPIKE_VERSION}
    container_name: aerospike-source
    volumes:
      - .:/opt/aerospike/etc/
    environment:
      - FEATURE_KEY_FILE=/opt/aerospike/etc/features.conf
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
    command: --config-file /opt/aerospike/etc/aerospike-ee-${AEROSPIKE_MAJOR_VERSION}-source.conf
    depends_on:
      aerospike-target:
        condition: service_started

  aerospike-target:
    image: aerospike:ee-${AEROSPIKE_VERSION}
    container_name: aerospike-target
    volumes:
      - .:/opt/aerospike/etc/
    environment:
      - FEATURE_KEY_FILE=/opt/aerospike/etc/features.conf
    command: --config-file /opt/aerospike/etc/aerospike-ee-${AEROSPIKE_MAJOR_VERSION}-target.conf
