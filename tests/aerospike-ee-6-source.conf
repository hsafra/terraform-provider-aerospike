# Aerospike database configuration file.

# This stanza must come first.
service {
	user root
	group root
	pidfile /var/run/aerospike/asd.pid
	proto-fd-max 15000
}

logging {

	# Log file must be an absolute path.
	file /dev/null {
		context any detail
	}

	# Send log messages to stdout
	console {
		context any info
	}
}

network {
	service {
		address any
		port 3000
	}

	heartbeat {
        address any
		mode mesh
		port 3002

		interval 150
		timeout 10
	}

	fabric {
	    address any
		port 3001
	}

}

security {
        enable-quotas true
}

namespace aerospike {
	replication-factor 2
	memory-size 1G
	default-ttl 30d
	nsup-period 120

	storage-engine device {
		file /opt/aerospike/data/test.dat
		filesize 4G
		data-in-memory true
	}
}

xdr {
	dc target-dc {
		auth-mode internal
		auth-user admin
		auth-password-file /opt/aerospike/etc/xdr-password.txt
		node-address-port aerospike-target 3000
		namespace aerospike {
		}
	}
}
